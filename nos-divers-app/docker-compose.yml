version: "3.8"

services:
  # ── MySQL Database ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: nos-divers-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme-root-pw}
      MYSQL_DATABASE: nos_divers
      MYSQL_USER: nosdivers
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme-db-pw}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-database.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ──────────────────────────────────────
  server:
    build: .
    container_name: nos-divers-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://nosdivers:${MYSQL_PASSWORD:-changeme-db-pw}@db:3306/nos_divers
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-min-32-chars}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8081}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Kakao OAuth
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}

      # Admin emails (comma-separated)
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}

volumes:
  mysql_data:
    driver: local
